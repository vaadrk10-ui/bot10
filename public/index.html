<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ועד בניין – רועי קליין 10</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2c5f8a;
      --accent-light: #e8f0f8;
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1a1a;
      --muted: #6b6560;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: var(--accent);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hicon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 17px; font-weight: 700; }
    header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .chat-wrap {
      width: 100%; max-width: 680px;
      display: flex; flex-direction: column;
      padding: 0 14px 14px;
      flex: 1;
    }

    #messages {
      display: flex; flex-direction: column;
      gap: 14px;
      padding: 18px 0 8px;
      min-height: 300px;
      max-height: calc(100vh - 230px);
      overflow-y: auto;
    }

    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row.user { flex-direction: row-reverse; }

    .av {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .row.user .av { background: var(--accent); color: white; }

    .bub {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.65;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
      color: var(--text);
      white-space: pre-wrap;
    }

    .row.user .bub {
      background: var(--accent);
      color: white;
      border: none;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 18px;
    }

    .typing {
      display: flex; gap: 5px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-right-radius: 4px;
      width: fit-content;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: b 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes b { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    #chips {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 4px 0 8px;
    }

    .chip {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #c2d8ee;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
    }
    .chip:hover { background: #d4e7f5; }

    .input-box {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    textarea {
      flex: 1; border: none; outline: none; resize: none;
      font-family: 'Heebo', sans-serif; font-size: 15px;
      background: transparent; color: var(--text);
      max-height: 100px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--muted); }

    #send {
      width: 38px; height: 38px;
      background: var(--accent); border: none; border-radius: 10px;
      color: white; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="hicon">🏢</div>
    <div>
      <h1>ועד בניין – רועי קליין 10, רמת גן</h1>
      <p>עוזר חכם לדיירי הבניין</p>
    </div>
  </header>

  <div class="chat-wrap">
    <div id="messages"></div>

    <div id="chips">
      <button class="chip" onclick="chip(this)">פרטי הבניין</button>
      <button class="chip" onclick="chip(this)">חברת הניהול</button>
      <button class="chip" onclick="chip(this)">יצירת קשר עם הועד</button>
      <button class="chip" onclick="chip(this)">תקלה / תיקון</button>
      <button class="chip" onclick="chip(this)">מסירת הדירה</button>
    </div>

    <div class="input-box">
      <textarea id="inp" rows="1" placeholder="שאל/י שאלה על הבניין..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button id="send" onclick="send()">➤</button>
    </div>
  </div>

<script>
  let history = [];
  let busy = false;

  function addMsg(text, role) {
    const el = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const av = document.createElement('div');
    av.className = 'av';
    av.textContent = role === 'user' ? '👤' : '🏢';
    const bub = document.createElement('div');
    bub.className = 'bub';
    bub.textContent = text;
    row.appendChild(av);
    row.appendChild(bub);
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
  }

  function showTyping() {
    const el = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'row bot'; row.id = 'typing';
    const av = document.createElement('div'); av.className = 'av'; av.textContent = '🏢';
    const t = document.createElement('div'); t.className = 'typing';
    t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(av); row.appendChild(t);
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
  }

  async function send(text) {
    if (busy) return;
    const inp = document.getElementById('inp');
    const msg = text || inp.value.trim();
    if (!msg) return;
    inp.value = ''; inp.style.height = 'auto';
    document.getElementById('chips').style.display = 'none';
    busy = true; document.getElementById('send').disabled = true;
    addMsg(msg, 'user');
    history.push({ role: 'user', content: msg });
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      history.push({ role: 'assistant', content: data.reply });
      addMsg(data.reply, 'bot');
    } catch(e) {
      document.getElementById('typing')?.remove();
      addMsg('אירעה שגיאה. נסה שוב.', 'bot');
    }
    busy = false; document.getElementById('send').disabled = false;
  }

  function chip(btn) { send(btn.textContent); }

  addMsg('שלום! 👋 אני העוזר הדיגיטלי של ועד הבניין ברועי קליין 10, רמת גן.\nאשמח לעזור בכל שאלה הקשורה לבניין, חברת הניהול, ועניינים שוטפים.', 'bot');
</script>
</body>
</html>
